                    if (parts) {
                        let year = parseInt(parts[1]);

                        let day = parseInt(parts[3]);
                        let hour = parseInt(parts[5]);
                        let minute = parseInt(parts[6]);

                    }
                }
                return startDate <= limitDate;
            })();

            // [NEW] 공연장 수령 마감 여부 체크
            const isVenuePickupBlocked = startDate && (() => {
                const year = startDate.getFullYear();
                const month = startDate.getMonth() + 1;
                const day = startDate.getDate();
                const dateKey = `${year}-${month}-${day}`;
                return BLOCKED_VENUE_PICKUP_DATES.includes(dateKey);
            })();

            const formatPhone = (value) => {
                const raw = value.replace(/[^0-9]/g, '');
                if (raw.length < 4) return raw;
                if (raw.length < 8) return `${raw.slice(0, 3)}-${raw.slice(3)}`;
                return `${raw.slice(0, 3)}-${raw.slice(3, 7)}-${raw.slice(7, 11)}`;
            };

            const handleAddressSearch = () => {
                if (!window.daum || !window.daum.Postcode) {
                    alert("우편번호 서비스를 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                    return;
                }
                new daum.Postcode({
                    oncomplete: function(data) {
                        let fullAddress = data.address;
                        let extraAddress = '';
                        if (data.addressType === 'R') {
                            if (data.bname !== '') extraAddress += data.bname;
                            if (data.buildingName !== '') extraAddress += (extraAddress !== '' ? `, ${data.buildingName}` : data.buildingName);
                            fullAddress += (extraAddress !== '' ? ` (${extraAddress})` : '');
                        }
                        setUserInfo(prev => ({ ...prev, zipcode: data.zonecode, address: fullAddress }));
                    }
                }).open();
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('계좌번호가 복사되었습니다!');
                } catch (err) {
                    console.error('Copy failed', err);
                    alert('복사에 실패했습니다. 직접 입력해주세요.');
                }
                document.body.removeChild(textArea);
            };

            const isHoliday = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const dateKey = `${year}-${month}-${day}`;
                const dayOfWeek = date.getDay(); 
                return dayOfWeek === 0 || dayOfWeek === 6 || !!HOLIDAYS[dateKey];
            };

            const getNextBusinessDay = (date) => {
                let nextDate = new Date(date);
                while (isHoliday(nextDate)) {
                    nextDate.setDate(nextDate.getDate() + 1);
                }
                return nextDate;
            };

            // [UPDATE] 반납 방법에 따라 반납 날짜를 다르게 계산하도록 업그레이드
            const getReturnDate = (date, method = returnMethod) => {
                if (!date) return null;
                let returnDate = new Date(date);
                
                // 1. 당일 반납: 대여종료일(endDate)과 동일한 날짜
                if (method === 'sameday') {
                    return returnDate;
                }

                // 2. 그 외 (택배, 사무실, 공연장, 미선택)는 기본적으로 다음날 반납
                returnDate.setDate(returnDate.getDate() + 1);

                // 3. 택배 반납이거나 미선택 시 주말/공휴일이면 다음 영업일(평일)로 연장
                if ((method === 'post' || !method) && isHoliday(returnDate)) {
                    returnDate = getNextBusinessDay(returnDate);
                }
                
                return returnDate;
            };

            const getArrivalDate = (date) => {
                if (!date) return null;
                return new Date(date);
            };

            const calculateDays = () => {
                if (!startDate || !endDate) return 0;
                let count = 0;
                let currentDate = new Date(startDate);
                currentDate.setHours(0,0,0,0);
                const lastDate = new Date(endDate);
                lastDate.setHours(0,0,0,0);

                let targetEndDate = new Date(lastDate);

                // [UPDATE] 당일반납 옵션이 활성화된 날짜에 택배반납 선택 시, 실제 반납일 전날까지 대여 기간으로 연장 측정
                const endYear = lastDate.getFullYear();
                const endMonth = lastDate.getMonth() + 1;
                const endDay = lastDate.getDate();
                const endDateKey = `${endYear}-${endMonth}-${endDay}`;

                if (returnMethod === 'post' && AVAILABLE_ONSITE_DATES.includes(endDateKey)) {
                    const actualReturnDate = getReturnDate(lastDate);
                    if (actualReturnDate > lastDate) {
                        targetEndDate = new Date(actualReturnDate);
                        targetEndDate.setDate(targetEndDate.getDate() - 1);
                        targetEndDate.setHours(0,0,0,0);
                    }
                }

                while (currentDate <= targetEndDate) {
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth() + 1;
                    const day = currentDate.getDate();
                    const dateKey = `${year}-${month}-${day}`;

                    // [UPDATE] 공휴일은 대여일수 계산에서 완전히 제외 (카운트 안함)
                    if (!HOLIDAYS[dateKey]) {
                        count++;
                    }
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                return count;
            };
            
            const calculateTotal = () => {
                const days = calculateDays();
                // [UPDATE] 시작일과 종료일이 모두 지정되어 있다면, 공휴일 겹침으로 days가 0이어도 기본요금을 부과하도록 방어코드 추가
                if (!startDate || !endDate || !selectedPhone) return 0;
                
                // [UPDATE] 기본 1일로 변경
                const baseDays = 1;
                
                let total = 0;
                if (days <= baseDays) {
                    total = selectedPhone.basePrice;
                } else {
                    total = selectedPhone.basePrice + ((days - baseDays) * selectedPhone.addPrice);
                }
                
                if (insurance === 'basic') total += 3000;
                else if (insurance === 'premium') total += 5000;
                else if (insurance === 'none') total += 0;

                total += batteryCount * 3000;
                
                if (deliveryMethod === 'post') total += 4000;
                if (deliveryMethod === 'venue') total += 4000; 

                if (returnMethod === 'pickup') total += 4000;
                // [UPDATE] 당일반납 요금 15,000원으로 변경
                if (returnMethod === 'sameday') total += 15000;
                
                if (dataBackup) total += 10000;

                // [UPDATE] 할인 금액 변경
                if (discounts.twitter) total -= 4000; // X(트위터) 4000원
                if (discounts.blog) total -= 5000;   // 블로그 5000원
                if (discounts.kakao) total -= 4000;  // 카카오맵 4000원

                // [NEW] 계좌이체 선택 시 2,000원 즉시 할인
                if (paymentMethod === 'transfer') total -= 2000;

                return Math.max(0, total);
            };

            const getStatusClass = (status) => {
                if (!status) return 'bg-gray-200 text-gray-500';
                if (status.includes('확정')) return 'bg-green-100 text-green-600';
                if (status.includes('취소') || status.includes('환불')) return 'bg-red-100 text-red-600';
                return 'bg-gray-200 text-gray-500';
            };

            const formatDisplayDate = (val) => {
                if (!val) return '-';
                if (String(val).includes('년') || String(val).includes('(')) return val;
                
                const date = new Date(val);
                if (isNaN(date.getTime())) return val; 

                const year = date.getFullYear().toString().slice(2);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                return `${year}년 ${month}월 ${day}일`;
            };
            
            const resetDates = () => {
                setStartDate(null);
                setEndDate(null);
                setDateWarning(null);
            };

            // [NEW] 실제 사용일 변경 시 반납일 자동 계산 로직
            const handleUsageDaysChange = (val) => {
                setUsageDays(val);
                if (val !== 'direct' && startDate) {
                    let daysToAdd = parseInt(val) - 1;
                    let finalEndDate = new Date(startDate);
                    finalEndDate.setDate(finalEndDate.getDate() + daysToAdd);
                    
                    let checkDate = new Date(startDate);
                    let hasBlocked = false;
                    while (checkDate <= finalEndDate) {
                        const y = checkDate.getFullYear();
                        const m = checkDate.getMonth() + 1;
                        const d_val = checkDate.getDate();
                        const k = `${y}-${m}-${d_val}`;
                        if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(k)) {
                            hasBlocked = true; break;
                        }
                        checkDate.setDate(checkDate.getDate() + 1);
                    }
                    
                    if (hasBlocked) {
                        alert("해당 기간으로 변경 시 예약 마감된 날짜가 포함됩니다. 날짜를 다시 선택해주세요.");
                        setStartDate(null);
                        setEndDate(null);
                    } else {
                        setEndDate(finalEndDate);
                        setDateWarning(null);
                    }
                }
            };

            const handleSubmit = async () => {
                if(!GOOGLE_SCRIPT_URL) {
                    alert("구글 시트 연동 URL이 설정되지 않았습니다. 개발자에게 문의해주세요.");
                    return;
                }

                setIsSubmitting(true);
                const formatDateDot = (d) => d ? `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}` : '';
                const getShortModelName = (fullName) => {
                    if (fullName.includes('S23')) return '23U';
                    if (fullName.includes('S24')) return '24U';
                    if (fullName.includes('S25')) return '25U';
                    if (fullName.includes('S26')) return '26U';
                    // [UPDATE] 아이폰 약어 수정 (띄어쓰기 여부 무관하게 처리)
                    if (fullName.includes('17프로맥스') || fullName.includes('17 프로맥스')) return '17PM';
                    if (fullName.includes('17프로') || fullName.includes('17 프로')) return '17P';
                    return fullName;
                };

                // [UPDATE] 보조배터리 선택 시 모델명 뒤에 '+보조배터리' 텍스트 추가
                let finalModelName = getShortModelName(selectedPhone.name);
                if (batteryCount > 0) {
                    finalModelName += "+보조배터리";
                }

                const fullAddress = `${userInfo.address} ${userInfo.detailAddress}`.trim();

                let insuranceText = '미선택';
                if(insurance === 'none') insuranceText = '미가입';
                else if(insurance === 'basic') insuranceText = '베이직';
                else if(insurance === 'premium') insuranceText = '프리미엄';

                // [UPDATE] 리뷰 텍스트 매핑 수정
                let reviewText = '';
                if (discounts.twitter) reviewText = '트위터';
                else if (discounts.blog) reviewText = '블로그';
                else if (discounts.kakao) reviewText = '카카오맵';
                else reviewText = '선택안함';

                let deliveryText = '미선택';
                if (deliveryMethod === 'post') deliveryText = '택배수령';
                else if (deliveryMethod === 'quick') deliveryText = '퀵수령';
                else if (deliveryMethod === 'venue') deliveryText = '공연장수령';
                else if (deliveryMethod === 'office') deliveryText = '사무실수령';

                let returnText = '미선택';
                if (returnMethod === 'pickup') returnText = '방문수거';
                else if (returnMethod === 'post') returnText = '택배반납';
                else if (returnMethod === 'office') returnText = '사무실반납';
                else if (returnMethod === 'sameday') returnText = '당일반납';
                else if (returnMethod === 'venue') returnText = '공연장반납';

                // [NEW] 결제수단 텍스트 변환
                let paymentText = paymentMethod === 'transfer' ? '계좌이체' : '네이버스토어결제';

                const total = calculateTotal();
                const orderData = {
                    orderTime: new Date().toLocaleString('ko-KR'),
                    status: '예약신청',
                    battery: batteryCount > 0 ? '보조배터리' : '',
                    model: finalModelName, // [UPDATE] 결합된 모델명 사용 (예: 23U+보조배터리)
                    name: userInfo.name,
                    zipcode: `'${userInfo.zipcode}`, 
                    address: fullAddress,
                    phone: userInfo.phone,
                    scheduleName: userInfo.scheduleName || `${userInfo.name}님 대여`, 
                    startDate: formatDateDot(startDate),
                    delivery: deliveryText,
                    endDate: formatDateDot(getReturnDate(endDate)),
                    returnMethod: returnText,
                    review: reviewText,
                    insurance: insuranceText,
                    paymentMethod: paymentText, // [NEW] 결제수단 추가
                    totalPrice: total,
                    trackingNumber: '',
                    dataBackup: dataBackup ? '신청' : '',
                    category: '예약신청' 
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(orderData),
                    });
                    
                    setSuccessData({
                        type: '예약',
                        name: userInfo.name,
                        amount: total,
                        paymentMethod: paymentMethod // [NEW] 성공 화면 분기를 위해 추가
                    });
                    setIsSubmitting(false); // [FIX] 전송 완료 후 로딩 상태 해제
                    setViewMode('success');

                } catch (error) {
                    console.error("Error submitting order:", error);
                    alert("주문 전송 중 오류가 발생했습니다. 다시 시도해주세요.");
                    setIsSubmitting(false);
                }
            };
            
            const handleGoHome = () => {
                setStep(1); 
                setSelectedPhone(null); 
                setStartDate(null); 
                setEndDate(null); 
                setInsurance('none');
                setUserInfo({ name: '', phone: '', zipcode: '', address: '', detailAddress: '', scheduleName: '' });
                setDataBackup(false);
                setDeliveryMethod(null);
                setReturnMethod(null);
                // [UPDATE] 할인 상태 초기화
                setDiscounts({ twitter: false, blog: false, kakao: false });
                setPaymentMethod(null); // [NEW] 결제수단 초기화 (미선택)
                setSuccessData(null); 
                setIsSubmitting(false);
                setUsageDays(null); // [UPDATE] 홈 이동 시 달력 숨김 상태로 초기화
                setActiveNav('home');
                setViewMode('dashboard');
            };

            const handleExtensionSubmit = async (extTotal) => {
                if (!extForm.name || !extForm.phone) {
                    alert("신청자 성함과 연락처를 입력해주세요.");
                    return;
                }
                if(!GOOGLE_SCRIPT_URL) {
                    alert("시스템 오류: 연동 URL 미설정");
                    return;
                }

                setIsSubmitting(true);
                const orderData = {
                    category: '연장신청',
                    orderTime: new Date().toLocaleString('ko-KR'),
                    model: extModel === 'galaxy' ? '갤럭시 (연장)' : '아이폰 (연장)',
                    name: extForm.name,

                    totalPrice: extTotal,

                };

                try {

                    setSuccessData({

                        amount: extTotal
                    });
                    setExtForm({ name: '', phone: '' });
                    setIsSubmitting(false); // [FIX] 전송 완료 후 로딩 상태 해제
                    setViewMode('success');

                } catch (error) {

                    setIsSubmitting(false);
                }

            const handleBackupSubmit = async () => {

                    totalPrice: 10000,
                    scheduleName: `${backupForm.name}님 백업신청`
                };

                        body: JSON.stringify(orderData),
                    });
                    
                    setSuccessData({

                        name: backupForm.name,
                        amount: 10000
                    });
                    setBackupForm({ name: '', phone: '' });
                    setIsSubmitting(false); // [FIX] 전송 완료 후 로딩 상태 해제
                    setViewMode('success');

                } catch (error) {
                    alert("신청 전송 실패");
                    setIsSubmitting(false);
                }
            };

            const handleLookup = async (nameParam, phoneParam, isRefresh = false) => {
                const targetName = nameParam || lookupName;
                const targetPhone = phoneParam || lookupPhone;

                if (!targetName || targetPhone.length < 10) { 
                    if (!nameParam) alert('정보를 올바르게 입력해주세요.'); 
                    return; 
                }
                if (!GOOGLE_SCRIPT_URL) { alert("연동 URL이 설정되지 않았습니다."); return; }
                
                setIsSearching(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(targetName)}&phone=${encodeURIComponent(targetPhone)}`, { redirect: "follow" });
                    const result = await response.json();
                    
                    if (result.result === "success") { 
                        const rawData = result.data;
                        const dataArray = Array.isArray(rawData) ? rawData : (rawData ? [rawData] : []);
                        
                        setLookupResult([...dataArray].reverse()); 
                        localStorage.setItem('pink_user', JSON.stringify({ name: targetName, phone: targetPhone }));
                    }
                    else { 
                        if (!nameParam) {
                            alert("일치하는 예약 정보가 없습니다."); 
                            setLookupResult(null); 
                        }
                    }
                } catch (error) { 
                    if (!nameParam) alert("조회 중 오류가 발생했습니다."); 
                } finally { 
                    setIsSearching(false); 
                }
            };
            
            const handleRefresh = async () => {
                if (lookupName && lookupPhone) {
                    await handleLookup(lookupName, lookupPhone, true); 
                }
            };

            const handleLogoutClick = () => {
                setIsLogoutModalOpen(true);
            };

            const handleLogoutConfirm = () => {
                localStorage.removeItem('pink_user');
                setLookupResult(null);
                setLookupName('');
                setLookupPhone('');
                setIsLogoutModalOpen(false);
            };

            const handleMonthChange = (increment) => {
                // [UPDATE] 달력 이동 방향(좌/우) 상태 설정
                setCalendarDirection(increment > 0 ? 'next' : 'prev');
                const newDate = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + increment, 1);
                setCurrentMonth(newDate);
            };

            const handleDateClick = (day) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const clickedDate = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                if (clickedDate < today) return;
                
                // [NEW] 마감 날짜 선택 방지 (단일 클릭)
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(dateKey)) {
                    // 이미 renderCalendarDays에서 클릭 이벤트 자체를 막고 있지만, 혹시 모를 상황을 대비해 추가
                    return;
                }

                // [NEW] 대여 기간을 먼저 선택하지 않은 경우 달력 클릭 방지 및 흔들림 효과
                if (!usageDays) {
                    setShakePeriodBox(true);
                    setTimeout(() => setShakePeriodBox(false), 400); // 애니메이션 종료 후 상태 초기화
                    if (navigator.vibrate) navigator.vibrate(50); // 모바일 기기 진동 피드백
                    return;
                }

                if (usageDays !== 'direct') {
                    // [NEW] 자동 계산 모드 (1일/2일/3일)
                    let daysToAdd = parseInt(usageDays) - 1;
                    let finalEndDate = new Date(clickedDate);
                    finalEndDate.setDate(finalEndDate.getDate() + daysToAdd);

                    // 마감 날짜 포함 여부 체크
                    let checkDate = new Date(clickedDate);
                    let hasBlocked = false;
                    while (checkDate <= finalEndDate) {
                        const y = checkDate.getFullYear();
                        const m = checkDate.getMonth() + 1;
                        const d_val = checkDate.getDate();
                        const k = `${y}-${m}-${d_val}`;
                        
                        if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(k)) {
                            hasBlocked = true;
                            break;
                        }
                        checkDate.setDate(checkDate.getDate() + 1);
                    }
                    
                    if (hasBlocked) {
                        alert("선택하신 기간에 예약 마감된 날짜가 포함되어 있어요! 😭\n다른 날짜를 선택해주세요.");
                        return;
                    }

                    setStartDate(clickedDate);
                    setEndDate(finalEndDate);
                    setDateWarning(null);

                } else {
                    // 기존 직접 선택 모드
                    if (!startDate || (startDate && endDate)) { 
                        setStartDate(clickedDate); 
                        setEndDate(null); 
                        setDateWarning(null);

                        {type === '예약' && (<div className="bg-gray-50 p-4 rounded-xl text-xs text-gray-500 text-left w-full mb-8 leading-relaxed"><strong>📢 자동 취소 주의</strong><br/>1. 결제하지 않고 예약만 진행한 경우<br/>2. 입금자명(주문자명)과 예약자명이 다른 경우</div>)}

                                    <span className="font-bold text-[13px] leading-relaxed">
                                        {toast.message.split('\n').map((line, i) => (
                                            <React.Fragment key={i}>
                                                {line}<br/>
                                            </React.Fragment>
                                        ))}
                                    </span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PhoneRentalApp />);
    </script>
</body>
</html>
