                        let minute = parseInt(parts[6]);

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        const MAX_HEIGHT = 600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 화질 및 용량 최적화
                        callback(dataUrl);
                    };
                };

            const isSameDayStart = startDate && (() => {

                    const m = limitDate.getMonth();
                    const d = limitDate.getDate();
                    const key = `${y}-${m + 1}-${d}`;
                    if (limitDate.getDay() !== 0 && limitDate.getDay() !== 6 && !HOLIDAYS[key]) {
                        addedBusinessDays++;
                    }
                }
                return startDate <= limitDate;

            // [NEW] 택배 수령 마감 여부 체크

                return `${raw.slice(0, 3)}-${raw.slice(3, 7)}-${raw.slice(7, 11)}`;
            };

            const handleAddressSearch = () => {

                    return;

                new daum.Postcode({

                        let fullAddress = data.address;

                            if (data.bname !== '') extraAddress += data.bname;

            const isHoliday = (date) => {

                const dateKey = `${year}-${month}-${day}`;
                const dayOfWeek = date.getDay(); 
                return dayOfWeek === 0 || dayOfWeek === 6 || !!HOLIDAYS[dateKey];
            };

            const getNextBusinessDay = (date) => {
                let nextDate = new Date(date);
                while (isHoliday(nextDate)) {

                }

            };

            // [UPDATE] 반납 방법에 따라 반납 날짜를 다르게 계산하도록 업그레이드
            const getReturnDate = (date, method = returnMethod) => {
                if (!date) return null;
                let returnDate = new Date(date);
                
                // 1. 당일 반납: 대여종료일(endDate)과 동일한 날짜
                if (method === 'sameday') {
                    return returnDate;
                }

                // 2. 그 외 (택배, 사무실, 공연장, 미선택)는 기본적으로 다음날 반납
                returnDate.setDate(returnDate.getDate() + 1);

                }
                
                return returnDate;

            const calculateDays = () => {
                if (!startDate || !endDate) return 0;
                let count = 0;
                let currentDate = new Date(startDate);
                currentDate.setHours(0,0,0,0);
                const lastDate = new Date(endDate);
                lastDate.setHours(0,0,0,0);

                let targetEndDate = new Date(lastDate);

                // [UPDATE] 당일반납 옵션이 활성화된 날짜에 택배반납 선택 시, 실제 반납일 전날까지 대여 기간으로 연장 측정
                const endYear = lastDate.getFullYear();
                const endMonth = lastDate.getMonth() + 1;
                const endDay = lastDate.getDate();
                const endDateKey = `${endYear}-${endMonth}-${endDay}`;

                if (returnMethod === 'post' && AVAILABLE_ONSITE_DATES.includes(endDateKey)) {
                    const actualReturnDate = getReturnDate(lastDate);
                    if (actualReturnDate > lastDate) {
                        targetEndDate = new Date(actualReturnDate);
                        targetEndDate.setDate(targetEndDate.getDate() - 1);
                        targetEndDate.setHours(0,0,0,0);
                    }
                }

                while (currentDate <= targetEndDate) {
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth() + 1;
                    const day = currentDate.getDate();
                    const dateKey = `${year}-${month}-${day}`;

                    // [UPDATE] 공휴일은 대여일수 계산에서 완전히 제외 (카운트 안함)
                    if (!HOLIDAYS[dateKey]) {
                        count++;
                    }
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                return count;
            };
            
            const calculateTotal = () => {
                const days = calculateDays();

                if (!startDate || !endDate || !selectedPhone) return 0;
                
                // [UPDATE] 기본 1일로 변경
                const baseDays = 1;
                
                let total = 0;
                if (days <= baseDays) {
                    total = selectedPhone.basePrice;
                } else {
                    total = selectedPhone.basePrice + ((days - baseDays) * selectedPhone.addPrice);
                }
                
                if (insurance === 'basic') total += 3000;
                else if (insurance === 'premium') total += 5000;
                else if (insurance === 'none') total += 0;

                if (deliveryMethod === 'venue') total += 4000;

                // [UPDATE] 할인 금액 변경

                if (discounts.kakao) total -= 4000;  // 카카오맵 4000원
                if (discounts.homepage) total -= 4000; // [NEW] 홈페이지 4000원

                // [NEW] 계좌이체 선택 시 1,000원 즉시 할인
                if (paymentMethod === 'transfer') total -= 1000;

                return Math.max(0, total);

                const year = date.getFullYear().toString().slice(2);

                    category: '예약신청'

                try {

            const handleLookup = async (nameParam = null, phoneParam = null, isRefresh = false) => {
                // [UPDATE] 외국인 이름 조회를 위해 중간 띄어쓰기는 유지하고 양끝 공백만 제거하도록 수정
                const targetName = (typeof nameParam === 'string' ? nameParam : lookupName).trim();
                const targetPhone = (typeof phoneParam === 'string' ? phoneParam : lookupPhone).trim();

                // [UPDATE] 유효성 검사 실패 시 모바일에서 막힐 수 있는 alert 대신 커스텀 토스트 알림 사용
                if (!targetName || !targetPhone || targetPhone.length < 10) { 
                    showAppToast('성함과 연락처를 올바르게 입력해주세요! 📝');
                    return; 
                }
                
                if (!GOOGLE_SCRIPT_URL) { 
                    showAppToast("연동 URL이 설정되지 않았습니다."); 
                    return; 
                }
                
                setIsSearching(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(targetName)}&phone=${encodeURIComponent(targetPhone)}`, { redirect: "follow" });
                    const result = await response.json();
                    
                    if (result.result === "success") { 
                        const rawData = result.data;
                        const dataArray = Array.isArray(rawData) ? rawData : (rawData ? [rawData] : []);
                        
                        setLookupResult([...dataArray].reverse()); 
                        if (dataArray.length > 0) {
                            localStorage.setItem('pink_user', JSON.stringify({ name: targetName, phone: targetPhone }));
                        }
                    }
                    else { 
                        if (!isRefresh) showAppToast("일치하는 예약 정보가 없습니다. 😢");
                        // [UPDATE] null 대신 빈 배열([])을 넣어 안내 가이드 화면이 뜨도록 수정
                        setLookupResult([]); 
                    }
                } catch (error) { 
                    showAppToast("조회 중 오류가 발생했습니다.\n다시 시도해주세요. 🚨");
                    setLookupResult([]); 
                } finally { 
                    setIsSearching(false); 
                }
            };
            
            const handleRefresh = async () => {
                if (lookupName && lookupPhone) {
                    await handleLookup(lookupName, lookupPhone, true); 
                }
            };

            const handleLogoutClick = () => {
                setIsLogoutModalOpen(true);
            };

            const handleLogoutConfirm = () => {
                localStorage.removeItem('pink_user');
                setLookupResult(null);
                setLookupName('');
                setLookupPhone('');
                setIsLogoutModalOpen(false);
            };

            const handleMonthChange = (increment) => {
                // [UPDATE] 달력 이동 방향(좌/우) 상태 설정
                setCalendarDirection(increment > 0 ? 'next' : 'prev');
                const newDate = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + increment, 1);
                setCurrentMonth(newDate);
            };

            const handleDateClick = (day) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const clickedDate = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                if (clickedDate < today) return;
                
                // [NEW] 마감 날짜 선택 방지 (단일 클릭)
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(dateKey)) {
                    // 이미 renderCalendarDays에서 클릭 이벤트 자체를 막고 있지만, 혹시 모를 상황을 대비해 추가
                    return;
                }

                // [NEW] 대여 기간을 먼저 선택하지 않은 경우 달력 클릭 방지 및 흔들림 효과
                if (!usageDays) {
                    setShakePeriodBox(true);
                    setTimeout(() => setShakePeriodBox(false), 400); // 애니메이션 종료 후 상태 초기화
                    if (navigator.vibrate) navigator.vibrate(50); // 모바일 기기 진동 피드백
                    return;
                }

                if (usageDays !== 'direct') {
                    // [NEW] 자동 계산 모드 (1일/2일/3일)
                    let daysToAdd = parseInt(usageDays) - 1;
                    let finalEndDate = new Date(clickedDate);
                    finalEndDate.setDate(finalEndDate.getDate() + daysToAdd);

                    // 마감 날짜 포함 여부 체크
                    let checkDate = new Date(clickedDate);
                    let hasBlocked = false;
                    while (checkDate <= finalEndDate) {
                        const y = checkDate.getFullYear();
                        const m = checkDate.getMonth() + 1;
                        const d_val = checkDate.getDate();
                        const k = `${y}-${m}-${d_val}`;
                        
                        if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(k)) {
                            hasBlocked = true;
                            break;
                        }
                        checkDate.setDate(checkDate.getDate() + 1);
                    }
                    
                    if (hasBlocked) {
                        alert("선택하신 기간에 예약 마감된 날짜가 포함되어 있어요! 😭\n다른 날짜를 선택해주세요.");
                        return;
                    }

                    setStartDate(clickedDate);
                    setEndDate(finalEndDate);
                    setDateWarning(null);

                } else {
                    // 기존 직접 선택 모드
                    if (!startDate || (startDate && endDate)) { 
                        setStartDate(clickedDate); 
                        setEndDate(null); 
                        setDateWarning(null); 
                    } else {
                        let finalEndDate = new Date(clickedDate);
                        
                        // [NEW] 기간 선택 시 마감 날짜 포함 여부 체크
                        if (startDate < finalEndDate) {
                             let checkDate = new Date(startDate);
                             checkDate.setDate(checkDate.getDate() + 1); // 시작일 다음날부터 체크
                             let hasBlocked = false;
                             
                             while (checkDate <= finalEndDate) {
                                 const y = checkDate.getFullYear();
                                 const m = checkDate.getMonth() + 1;
                                 const d_val = checkDate.getDate();
                                 const k = `${y}-${m}-${d_val}`;
                                 
                                 if (selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(k)) {
                                     hasBlocked = true;
                                     break;
                                 }
                                 checkDate.setDate(checkDate.getDate() + 1);
                             }
                             
                             if (hasBlocked) {
                                 alert("선택하신 기간에 예약 마감된 날짜가 포함되어 있어요! 😭\n다른 날짜를 선택해주세요.");
                                 return;
                             }
                        }

                        let warningMsg = null;
                        if (finalEndDate < startDate) { 
                            setStartDate(finalEndDate); 
                            setEndDate(null); 
                            setDateWarning(null); 
                        }
                        else {
                            setStartDate(startDate); 
                            setEndDate(finalEndDate); 
                            setDateWarning(warningMsg);
                        }
                    }
                }
            };

            const handleRentalStart = (method) => {
                if(method) setDeliveryMethod(method);
                else {
                    setDeliveryMethod(null);
                    setReturnMethod(null);
                }
                setViewMode('rental');
                setStep(1); 
                setActiveNav('rental'); 
            };

            const handleNavChange = (nav) => {
                setActiveNav(nav);
                setFaqSearchQuery(''); // [NEW] 메뉴 이동 시 FAQ 검색어 초기화
                if (nav === 'home') {
                    setViewMode('dashboard');
                } else if (nav === 'rental') {
                    handleRentalStart(); 
                } else if (nav === 'qna') {
                    setViewMode('qna');
                } else if (nav === 'mypage') {
                    setViewMode('lookup');
                }
            };

            useEffect(() => { window.scrollTo(0, 0); }, [step, viewMode, activeNav]);
            
            // [NEW] 선택한 날짜 구간에 기기가 마감되었는지 확인하는 함수
            const isModelBlocked = (modelName) => {
                if (!startDate || !endDate) return false;
                let checkDate = new Date(startDate);
                checkDate.setHours(0,0,0,0);
                const lastDate = new Date(endDate);
                lastDate.setHours(0,0,0,0);
                
                while (checkDate <= lastDate) {
                    const y = checkDate.getFullYear();
                    const m = checkDate.getMonth() + 1;
                    const d_val = checkDate.getDate();
                    const k = `${y}-${m}-${d_val}`;
                    if (BLOCKED_SCHEDULE[modelName] && BLOCKED_SCHEDULE[modelName].includes(k)) {
                        return true;
                    }
                    checkDate.setDate(checkDate.getDate() + 1);
                }
                return false;
            };

            // [NEW] 예약 조회 실패 시 안내 문구 재사용 컴포넌트
            const renderNotFoundGuide = () => (
                <div className="mt-6 text-left">
                    {/* [NEW] 안내 가이드 토글 버튼 (닫혀있을 때만 둥둥 뛰는 애니메이션 적용) */}
                    <button 
                        onClick={() => setShowNotFoundGuide(!showNotFoundGuide)}
                        className={`w-full bg-blue-50 border border-blue-200 text-blue-600 py-3.5 rounded-2xl font-bold text-sm shadow-sm hover:bg-blue-100 transition-all flex items-center justify-center gap-2 ${!showNotFoundGuide ? 'animate-float' : ''}`}
                    >
                        <Icons.HelpCircle size={18} />
                        예약 조회가 안 되시나요?
                        <Icons.ChevronRight size={16} className={`transform transition-transform duration-300 ${showNotFoundGuide ? '-rotate-90' : 'rotate-90'}`} />
                    </button>

                    {/* [NEW] 아코디언 내용 영역 */}
                    <div className={`overflow-hidden transition-all duration-500 ease-in-out ${showNotFoundGuide ? 'max-h-[600px] opacity-100 mt-3' : 'max-h-0 opacity-0 mt-0'}`}>
                        <div className="bg-gray-50 p-5 rounded-2xl border border-gray-100 shadow-sm">
                            <p className="text-[13px] text-gray-600 mb-4 leading-relaxed font-medium">카카오톡으로 <strong className="text-blue-500">결제 및 예약안내 알림톡</strong>을 받으셨나요?</p>
                            
                            <div className="flex gap-2 mb-4">
                                <button 
                                    onClick={() => setAlimtalkStatus('received')} 
                                    className={`flex-1 py-3 rounded-xl text-[13px] font-bold transition-all ${alimtalkStatus === 'received' ? 'bg-blue-500 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-100'}`}
                                >
                                    알림톡을 받았어요!
                                </button>
                                <button 
                                    onClick={() => setAlimtalkStatus('not_received')} 
                                    className={`flex-1 py-3 rounded-xl text-[13px] font-bold transition-all ${alimtalkStatus === 'not_received' ? 'bg-gray-800 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-100'}`}
                                >
                                    아직 못 받았어요
                                </button>
                            </div>

                            {/* 아코디언 애니메이션 추가 및 불필요한 여백 제거 */}
                            <div className={`overflow-hidden transition-all duration-500 ease-in-out ${alimtalkStatus ? 'max-h-[250px] opacity-100 mb-5' : 'max-h-0 opacity-0 mb-0'}`}>
                                {alimtalkStatus === 'received' && (
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-100 text-xs text-red-700 leading-relaxed text-center">
                                        <p className="font-bold mb-1 text-sm text-red-600">🚨 신청서 누락 안내</p>
                                        신청서 제출 중 창을 닫거나 다른 작업을 하여<br/><strong>신청서가 누락</strong>되었을 수도 있어요.<br/>번거로우시겠지만 <strong>다시 예약</strong>해 주세요!
                                    </div>
                                )}
                                
                                {alimtalkStatus === 'not_received' && (
                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-xs text-yellow-800 leading-relaxed text-center">
                                        <p className="font-bold mb-1 text-sm text-yellow-700">📞 연락처 오입력 안내</p>
                                        카카오톡 가입한 연락처를 <strong>잘못 입력</strong>한 확률이 높아요!<br/>카카오톡 가입한 연락처를 <strong>올바르게 입력</strong>하여<br/><strong>다시 예약</strong>해주세요!
                                    </div>
                                )}
                            </div>

                            <div className="pt-5 border-t border-gray-200">
                                <p className="text-[13px] text-gray-700 mb-2 leading-relaxed font-bold text-center">
                                    궁금하시거나 불편하신점은<br/>카카오톡 채널로 문의 남겨주세요!
                                </p>
                                <p className="text-[11px] text-gray-500 mb-4 leading-snug bg-white p-2 rounded-lg border border-gray-100 text-center">
                                    단, 밤~새벽시간대는 답변이 늦을 순 있으나<br/>정상적으로 대여하실 수 있게<br/>최대한 도움 드리도록 하겠습니다!
                                </p>
                                <button 
                                    onClick={() => setShowKakaoModal(true)} 
                                    className="w-full bg-[#FAE100] text-[#373737] py-3.5 rounded-xl text-sm font-bold shadow-sm hover:bg-[#FDD835] transition-colors flex items-center justify-center gap-2"
                                >
                                    <Icons.MessageHeart size={18}/> 카카오톡 채널 문의하기
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
            
            const renderLookupPage = () => (
                <div className="animate-slide-in space-y-6">
                    <div className="flex items-center gap-3 mb-6">
                        {activeNav !== 'mypage' && (
                            <button onClick={() => setViewMode('dashboard')} className="p-2 bg-white rounded-full shadow-sm">
                                <Icons.ChevronLeft className="w-5 h-5 text-gray-600" />
                            </button>
                        )}
                        <h2 className="text-xl font-bold text-gray-800">예약 조회</h2>
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        {!lookupResult ? (
                            <div className="space-y-4">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-500">
                                        <Icons.User size={32} />
                                    </div>
                                    <h3 className="font-bold text-gray-800">예약자 정보를 입력해주세요</h3>
                                    <p className="text-xs text-gray-500 mt-1">예약 시 입력한 성함과 연락처로 조회됩니다.</p>
                                </div>
                                <input type="text" placeholder="성함" className="w-full p-3 bg-gray-50 rounded-xl outline-none text-sm border border-transparent focus:border-blue-200 transition-colors" value={lookupName} onChange={(e) => setLookupName(e.target.value)} />
                                <input type="text" placeholder="연락처 (010-0000-0000)" className="w-full p-3 bg-gray-50 rounded-xl outline-none text-sm border border-transparent focus:border-blue-200 transition-colors" value={lookupPhone} onChange={(e) => setLookupPhone(formatPhone(e.target.value))} onKeyPress={(e) => e.key === 'Enter' && handleLookup()}/>
                                
                                {/* [UPDATE] 버튼 클릭 애니메이션(active:scale-95) 추가 및 조회 중 아이콘 표시로 직관성 개선 */}
                                <button 
                                    onClick={() => handleLookup()} 
                                    disabled={isSearching} 
                                    className={`w-full py-4 rounded-xl font-bold shadow-md transition-all flex justify-center items-center gap-2 mt-2 ${isSearching ? 'bg-blue-300 text-white cursor-not-allowed' : 'bg-blue-500 text-white hover:bg-blue-600 active:scale-95'}`}
                                >
                                    {isSearching ? <><Icons.RefreshCw size={18} className="animate-spin-slow" /> 조회 중...</> : <><Icons.Search size={18} /> 내역 조회하기</>}
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div className="flex justify-between items-center mb-4 pb-2 border-b border-gray-100">
                                    <h3 className="font-bold text-gray-800"><span className="text-blue-500">{formatNameMasking(lookupName)}</span>님의 예약</h3>
                                    <div className="flex items-center gap-3">
                                        <button onClick={handleRefresh} disabled={isSearching} className={`text-xs text-gray-500 hover:text-blue-500 flex items-center gap-1 transition-colors ${isSearching ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                            <Icons.RefreshCw size={11} className={isSearching ? 'animate-spin' : ''} /> 
                                            {isSearching ? '조회중' : '새로고침'}
                                        </button>
                                        <div className="w-px h-2.5 bg-gray-300"></div>
                                        <button onClick={handleLogoutClick} className="text-xs text-gray-400 hover:text-gray-600">로그아웃</button>
                                    </div>
                                </div>
                                {lookupResult.length === 0 ? (
                                    <div className="text-center py-6 animate-fade-in">
                                        <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                                            <Icons.Search size={24} className="text-gray-300"/>
                                        </div>
                                        <p className="font-bold text-gray-600 mb-1 text-sm">예약 내역이 없습니다.</p>
                                        <p className="text-[11px] text-gray-400 mb-2">입력하신 정보로 조회된 내역이 없어요.</p>
                                        
                                        <button onClick={() => {setLookupResult(null); setLookupName(''); setLookupPhone('');}} className="mt-2 mb-6 text-[11px] font-bold text-gray-500 bg-white border border-gray-200 px-4 py-2 rounded-full hover:bg-gray-50 transition-colors shadow-sm">
                                            <Icons.RefreshCw size={10} className="inline mr-1" /> 다른 정보로 다시 조회하기
                                        </button>
                                        
                                        {renderNotFoundGuide()}
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {lookupResult.map((item, idx) => (
                                            <div key={idx} className="border border-gray-100 rounded-2xl p-4 bg-gray-50 hover:bg-white hover:shadow-sm transition-all">
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${(item.status || '').includes('확정') ? 'bg-green-100 text-green-600' : (item.status || '').includes('취소') || (item.status || '').includes('환불') ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-500'}`}>{item.status || '접수대기'}</span>
                                                    <span className="text-[10px] text-gray-400">{item.orderTime ? (String(item.orderTime).includes('T') ? formatDisplayDate(item.orderTime) : item.orderTime) : '-'}</span>
                                                </div>
                                                <h4 className="font-bold text-gray-800 text-sm mb-2">{item.model} {item.scheduleName && <span className="text-xs font-normal text-gray-500 ml-1">| {item.scheduleName}</span>}</h4>
                                                <div className="text-xs text-gray-500 space-y-1.5 pt-2 border-t border-gray-200/50">
                                                    <div className="flex justify-between"><span className="text-gray-400">예약자</span><span className="font-bold text-gray-700">{item.name} ({item.phone})</span></div>
                                                    <div className="flex justify-between items-start"><span className="text-gray-400 shrink-0">주소</span><span className="font-bold text-gray-700 text-right break-keep" style={{maxWidth: '70%'}}>{item.address}</span></div>
                                                    {item.startDate && (<div className="flex justify-between mt-1"><span className="text-gray-400">대여 기간</span><span className="font-bold text-gray-700">{formatDisplayDate(item.startDate)} ~ {formatDisplayDate(item.endDate)}</span></div>)}
                                                    <div className="flex justify-between"><span className="text-gray-400 shrink-0">수령/반납</span><span className="font-bold text-gray-700 text-right">{item.delivery || '-'} <span className="text-gray-300 mx-0.5 text-[10px]">|</span> {item.returnMethod || '-'}</span></div>
                                                    
                                                    {item.trackingNumber && (
                                                        <div className="flex justify-between items-center bg-yellow-50 p-1.5 rounded-lg">
                                                            <div className="flex items-center gap-1.5"><span className="text-yellow-600 font-bold text-xs">📦 우체국택배</span><span className="font-bold text-gray-800 text-sm select-all">{item.trackingNumber}</span></div>
                                                            <button onClick={() => copyToClipboard(item.trackingNumber)} className="text-[10px] bg-white border border-yellow-200 text-yellow-600 px-2 py-1 rounded hover:bg-yellow-100">복사</button>
                                                        </div>
                                                    )}

                                                    <div className="bg-gray-100 p-2 rounded-lg mt-1 space-y-1">
                                                        <div className="flex justify-between"><span className="text-gray-500">파손보험</span><span className="font-bold text-gray-700">{item.insurance || '미가입'}</span></div>
                                                        <div className="flex justify-between"><span className="text-gray-500">리뷰이벤트</span><span className="font-bold text-gray-700">{item.review && item.review !== '선택안함' ? item.review : '미참여'}</span></div>
                                                    </div>

                                                    <div className="flex justify-between pt-2 mt-1 border-t border-gray-200 border-dashed items-center">
                                                        <span className="font-bold text-gray-600">총 결제금액</span>
                                                        <span className="text-lg font-bold text-blue-500">{Number(item.totalPrice).toLocaleString()}원</span>
                                                    </div>

                                                    {/* [UPDATE] 리뷰 버튼 대신 약속한 리뷰 채널에 따른 안내 문구 노출 (리뷰이벤트 참여자에게만 노출) */}
                                                    {(item.status || '').includes('확정') && item.review && item.review !== '선택안함' && (
                                                        <div className="mt-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                            <div className="flex items-center gap-1.5 mb-1">
                                                                <span className="text-lg">📢</span>
                                                                <span className="text-xs font-bold text-gray-700">리뷰 작성 안내</span>

                for (let d = 1; d <= days; d++) {

                    const isBlocked = selectedPhone && BLOCKED_SCHEDULE[selectedPhone.name] && BLOCKED_SCHEDULE[selectedPhone.name].includes(dateKey);

                    const isStart = startDate && thisDate.getTime() === startDate.getTime();
                    const isEnd = visualEndDate && thisDate.getTime() === visualEndDate.getTime();
                    const isInRange = startDate && visualEndDate && thisDate > startDate && thisDate < visualEndDate;
                    
                    if (isPast) className += "text-gray-300 cursor-not-allowed";

                                                        </div>

                                                            <Icons.Copy size={24} />
                                                        </div>
                                                        <span className="text-[11px] font-bold text-gray-700 whitespace-nowrap">{t('backup')}</span>

                                                            <Icons.CalendarPlus size={24} />
                                                        </div>
                                                        <span className="text-[11px] font-bold text-gray-700 whitespace-nowrap">{t('extension')}</span>

                                                    <div onClick={() => handleNavChange('qna')} className="flex flex-col items-center gap-2 cursor-pointer group shrink-0">

                                                        </div>

                                                <li>신상품 안내 및 이벤트 정보 제공 (마케팅 동의 시)</li>

                                            <p className="mt-1 text-[11px] text-gray-500">단, 관계 법령에 따라 보존할 필요가 있는 경우 해당 기간 동안 보관합니다.</p>

                                        <div>

                                            <p>회사는 원칙적으로 고객의 개인정보를 외부에 제공하지 않습니다. 단, 이용자가 사전에 동의하거나 법령/수사기관의 적법한 요청이 있는 경우는 예외로 합니다.</p>
                                        </div>

                                        <div>
                                            <h4 className="font-bold text-gray-800 mb-1.5 text-sm">5. 개인정보 처리 위탁 (배송)</h4>

                                                <div className="p-1.5 flex text-center text-gray-600 border-b border-gray-100">
                                                    <div className="w-1/2 border-r border-gray-100">우체국 택배</div>

                                                </div>
                                                <div className="p-1.5 flex text-center text-gray-600">
                                                    <div className="w-1/2 border-r border-gray-100">카카오 T 퀵</div>

                                                </div>
                                            </div>
                                        </div>

                                        </div>
                                    </div>
                                    <div className="mt-4 pt-3 border-t border-gray-100"><button onClick={() => setShowPrivacy(false)} className="w-full bg-gray-800 text-white py-3 rounded-xl font-bold shadow-md hover:bg-gray-700 transition-colors text-sm">확인했습니다</button></div>

                                </div>
                            </div>

                        {/* [NEW] 후기 작성 모달 */}

                                            <div className="relative">
                                                <select value={reviewForm.model || ''} onChange={(e) => setReviewForm({...reviewForm, model: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm font-bold text-gray-800 appearance-none focus:border-blue-400 focus:bg-white transition-all">
                                                    <option value="" disabled>기종을 선택해주세요</option>
                                                    <option value="갤럭시 S23 울트라">갤럭시 S23 울트라</option>
                                                    <option value="갤럭시 S24 울트라">갤럭시 S24 울트라</option>
                                                    <option value="갤럭시 S25 울트라">갤럭시 S25 울트라</option>
                                                    <option value="갤럭시 S26 울트라">갤럭시 S26 울트라</option>
                                                    <option value="아이폰 17 프로">아이폰 17 프로</option>

                                                    onClick={() => setReviewForm({...reviewForm, name: getRandomNickname()})}
                                                    className="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-0.5 rounded-lg hover:bg-blue-100 transition-colors flex items-center gap-1 shadow-sm"
                                                >
                                                    <Icons.RefreshCw size={10} /> 닉네임 자동 추천
                                                </button>

                                                                setReviewForm({...reviewForm, isManualVenue: true, selectedVenue: 'direct', venue: ''});

                                            </div>
                                        )}
                                        <div>
                                            <label className="text-xs font-bold text-gray-600 mb-1.5 block">별점</label>

                                    <div className="flex gap-2">
                                        <button onClick={() => setIsLogoutModalOpen(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors text-sm">취소</button>
                                        <button onClick={handleLogoutConfirm} className="flex-1 py-3 rounded-xl bg-blue-500 text-white font-bold hover:bg-blue-600 transition-colors text-sm">로그아웃</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* [UPDATE] 블로그 이동 확인 모달 (동적 URL 적용) */}
                        {isBlogConfirmOpen && (
                            <div className="fixed inset-0 z-[110] bg-black/50 flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl text-center transform scale-100 transition-all">
                                    <div className="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <span className="text-2xl">📗</span>
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-2">블로그로 이동하시겠어요?</h3>
                                    <p className="text-sm text-gray-500 mb-6 leading-relaxed">
                                        자세한 안내를 확인하기 위해<br/>
                                        <strong>세린캠 네이버 블로그</strong>로 이동합니다.
                                    </p>
                                    <div className="flex gap-2">
                                        <button onClick={() => setIsBlogConfirmOpen(false)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors text-sm">취소</button>
                                        <button onClick={() => { setIsBlogConfirmOpen(false); window.open(blogTargetUrl || 'https://blog.naver.com/serin_day', '_blank'); }} className="flex-1 py-3 rounded-xl bg-green-500 text-white font-bold hover:bg-green-600 transition-colors text-sm">이동하기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* [NEW] 데이터 전송 중 이탈 방지용 전체화면 로딩 오버레이 */}
                        {isSubmitting && (
                            <div className="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-3xl p-6 w-full max-w-[280px] shadow-2xl text-center flex flex-col items-center">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-5">
                                        <Icons.RefreshCw size={32} className="animate-spin-slow" />
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-3">
                                        {isReviewModalOpen ? (
                                            <>후기를 등록하고 있어요!<br/>잠시만 기다려주세요! ⏳</>
                                        ) : (
                                            <>신청서를 준비하고 있어요!<br/>잠시만 기다려주세요! ⏳</>
                                        )}
                                    </h3>
                                    <div className="bg-red-50 border border-red-100 rounded-xl p-4 w-full">
                                        <p className="text-sm font-bold text-red-500 mb-1.5 flex items-center justify-center gap-1">
                                            <Icons.ShieldCheck size={16} /> 화면을 절대 끄거나 닫지 마세요!
                                        </p>
                                        <p className="text-[11px] text-red-400 leading-snug break-keep">
                                            완료 화면이 뜰 때까지 창을 끄거나<br/>뒤로 가기를 누르지 말아주세요 🙏<br/>
                                            {isReviewModalOpen ? '리뷰 등록이 누락될 수 있어요' : '예약이 누락될 수 있어요'}<br/><br/>예상 소요 시간: 5초
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* [NEW] 화면 중앙에 예쁘게 뜨는 커스텀 토스트 알림 */}
                        {toast.show && (
                            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 pointer-events-none">
                                <div className="bg-gray-800/90 backdrop-blur-md text-white px-6 py-5 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.3)] flex flex-col items-center text-center animate-bounce-in w-64">
                                    <span className="text-3xl mb-3">📱</span>
                                    <span className="font-bold text-[13px] leading-relaxed">
                                        {toast.message.split('\n').map((line, i) => (
                                            <React.Fragment key={i}>
                                                {line}<br/>
                                            </React.Fragment>
                                        ))}
                                    </span>
                                </div>
                            </div>
                        )}

                        {/* [NEW] 이미지 확대(줌) 모달 추가 */}
                        {selectedImage && (
                            <div 
                                className="fixed inset-0 z-[10000] bg-black/90 flex items-center justify-center p-4 animate-fade-in cursor-zoom-out"
                                onClick={() => setSelectedImage(null)}
                            >
                                <button 
                                    onClick={() => setSelectedImage(null)} 
                                    className="absolute top-6 right-6 text-white/70 hover:text-white transition-colors bg-black/50 rounded-full p-2"
                                >
                                    <Icons.X size={32} />
                                </button>
                                <img 
                                    src={selectedImage} 
                                    alt="확대된 리뷰 사진" 
                                    className="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl animate-bounce-in cursor-default" 
                                    onClick={(e) => e.stopPropagation()} 
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PhoneRentalApp />);
    </script>
</body>
</html>
